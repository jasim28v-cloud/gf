<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة أخبار الظل</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="container">
            <div class="logo">24<span>NEWS</span></div>
            <nav class="main-nav">
                <ul>
                    <li><a href="#" class="active">الرئيسية</a></li>
                    <li><a href="#">الإخبارية</a></li>
                    <li><a href="#">الإمارات</a></li>
                    <li><a href="#">منوعات</a></li>
                    <li><a href="#">رياضة</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="hero-section">
            <div class="hero-card">
                <img src="https://via.placeholder.com/1200x600" id="main-image" alt="خبر رئيسي">
                <div class="hero-overlay">
                    <span class="badge">الإخبارية</span>
                    <h1 id="main-title">جاري سحب آخر الأخبار من المحرك...</h1>
                </div>
            </div>
        </section>

        <section class="news-grid" id="news-container">
            <div class="news-card">
                <img src="https://via.placeholder.com/400x250" alt="خبر">
                <div class="card-content">
                    <span class="category">محليات</span>
                    <h3>عنوان خبر تجريبي يوضح شكل التصميم</h3>
                </div>
            </div>
            <div class="news-card">
                <img src="https://via.placeholder.com/400x250" alt="خبر">
                <div class="card-content">
                    <span class="category">اقتصاد</span>
                    <h3>هنا سيظهر ملخص الخبر الذي يسحبه ملف news.py</h3>
                </div>
            </div>
        </section>
    </main>

</body>
</html>
