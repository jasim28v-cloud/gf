<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12 الإخبارية | الخبر بين لحظة وضحاها</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --brand-red: #e30613;
            --brand-blue: #0056b3;
            --dark-bg: #11141a;
            --header-bg: #1a1e26;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--dark-bg);
            color: #fff;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--header-bg);
            padding: 10px 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 3px solid var(--brand-red);
        }

        .header-top { display: flex; justify-content: space-between; align-items: center; }
        
        .logo-12 {
            display: flex;
            align-items: center;
            text-decoration: none;
            cursor: pointer;
        }

        .logo-num { font-size: 38px; font-weight: 900; color: #fff; line-height: 1; }
        .logo-dot { color: var(--brand-red); font-size: 45px; line-height: 0; margin-right: -5px; }

        nav {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding: 12px 0 5px;
            scrollbar-width: none;
        }
        nav::-webkit-scrollbar { display: none; }
        nav a { color: #fff; text-decoration: none; font-size: 14px; font-weight: bold; white-space: nowrap; opacity: 0.8; }
        nav a.active { opacity: 1; border-bottom: 3px solid var(--brand-red); padding-bottom: 5px; }

        .ad-container { display: flex; justify-content: center; margin: 15px 0; background: rgba(255,255,255,0.02); padding: 10px; }

        #adminArea { display: none; background: #000; padding: 20px; border: 1px dashed var(--brand-red); margin: 10px; border-radius: 10px; }
        input[type="text"], input[type="file"] { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #333; background: #222; color: #fff; box-sizing: border-box; }
        .btn-post { width: 100%; padding: 12px; background: var(--brand-red); color: #fff; border: none; font-weight: bold; border-radius: 5px; cursor: pointer; }

        .section-title { padding: 15px 15px 5px; font-weight: bold; font-size: 16px; display: flex; align-items: center; gap: 8px; color: #eee; }
        .section-title::after { content: ''; width: 6px; height: 6px; background: var(--brand-red); border-radius: 50%; }

        .video-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 10px 15px;
        }

        .v-card { cursor: pointer; transition: 0.3s; }
        .v-card:active { transform: scale(0.95); }

        .v-thumbnail {
            position: relative;
            width: 100%;
            aspect-ratio: 16/10;
            border-radius: 6px;
            overflow: hidden;
            background: #000;
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        .v-badge {
            position: absolute;
            top: 0;
            left: 0;
            background: var(--brand-blue);
            color: #fff;
            font-size: 11px;
            font-weight: 900;
            padding: 3px 8px;
            border-bottom-right-radius: 6px;
        }

        .play-btn {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.6);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .v-title {
            font-size: 13px;
            font-weight: 700;
            margin-top: 10px;
            line-height: 1.5;
            color: #fff;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .hidden-trigger { width: 30px; height: 30px; opacity: 0; position: absolute; left: 0; top: 0; }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <div style="color: #888; font-size: 20px;">🔍</div>
        <div class="logo-12" onclick="openAd()">
            <span class="logo-num">12</span><span class="logo-dot">.</span>
        </div>
        <input type="password" class="hidden-trigger" oninput="if(this.value=='1234') document.getElementById('adminArea').style.display='block'">
    </div>
    <nav>
        <a href="#" class="active">الرئيسية</a>
        <a href="#">الإخبارية</a>
        <a href="#">الإماراتية</a>
        <a href="#">منوعات</a>
        <a href="#">ملاعب</a>
        <a href="#">الوثائقية</a>
    </nav>
</header>

<div class="ad-container">
    <ins style="width: 300px;height:250px" data-width="300" data-height="250" class="g2fb0b4c321" data-domain="//data527.click" data-affquery="/e3435b2a507722939b6f/2fb0b4c321/?placementName=default">
        <script src="//data527.click/js/responsive.js" async></script>
    </ins>
</div>

<div id="adminArea">
    <input type="text" id="vTitle" placeholder="عنوان الخبر الجديد...">
    <input type="file" id="vFile" accept="video/*">
    <button class="btn-post" onclick="publish()">نشر الخبر الآن</button>
    <p id="status" style="text-align: center; font-size: 12px; margin-top: 10px;"></p>
</div>

<div class="section-title">أحدث الأخبار</div>
<div class="video-grid" id="newsGrid">
    </div>

<script type="text/javascript" src="//data527.click/129ba2282fccd3392338/b1a648bd38/?placementName=default"></script>

<script>
    const firebaseConfig = { databaseURL: "https://forg-c693e-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // رابط الإعلان المباشر الخاص بك
    const MY_AD = "https://data527.click/21330bf1d025d41336e6/57154ac610/?placementName=default";

    function openAd() { window.open(MY_AD, '_blank'); }

    async function publish() {
        const title = document.getElementById('vTitle').value;
        const file = document.getElementById('vFile').files[0];
        if(!title || !file) return alert("يرجى إدخال كافة البيانات");

        document.getElementById('status').innerText = "جاري الرفع سحابياً...";
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', 'update_vk');

        try {
            const res = await fetch('https://api.cloudinary.com/v1_1/dfscughol/video/upload', { method: 'POST', body: formData });
            const data = await res.json();
            if(data.secure_url) {
                db.ref('final_12_news').push({ title, url: data.secure_url });
                location.reload();
            }
        } catch (e) { alert("فشل الرفع"); }
    }

    db.ref('final_12_news').on('child_added', (snap) => {
        const p = snap.val();
        const card = `
            <div class="v-card" onclick="openAd()">
                <div class="v-thumbnail">
                    <div class="v-badge">12</div>
                    <video src="${p.url}" muted onmouseover="this.play()" onmouseout="this.pause()"></video>
                    <div class="play-btn">▶</div>
                </div>
                <div class="v-title">${p.title}</div>
            </div>
        `;
        document.getElementById('newsGrid').insertAdjacentHTML('afterbegin', card);
    });
</script>

</body>
</html>
